version: '3.8'

services:
  # Backend Service
  backend:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/bloodbank
      - JWT_SECRET=your_jwt_secret_key
      - NODE_ENV=production
      - ADMIN_NAME=System Administrator
      - ADMIN_EMAIL=admin@bloodconnect.com
      - ADMIN_PASSWORD=admin123
    depends_on:
      - mongodb

  # Frontend Service
  frontend:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - backend

  # Database Service
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
